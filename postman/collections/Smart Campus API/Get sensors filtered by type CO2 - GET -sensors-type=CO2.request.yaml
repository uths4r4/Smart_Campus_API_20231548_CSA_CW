$kind: http-request
name: Get sensors filtered by type CO2
url: '{{baseUrl}}/sensors?type=CO2'
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () { pm.response.to.have.status(200); });
      pm.test('Response is an array', function () { var json = pm.response.json(); pm.expect(Array.isArray(json)).to.be.true; });
      pm.test('Every item has type CO2', function () { var json = pm.response.json(); pm.expect(json.every(function (item) { return item.type === 'CO2'; })).to.be.true; });
order: 10000
