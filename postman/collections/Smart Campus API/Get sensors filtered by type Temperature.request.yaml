$kind: http-request
name: Get sensors filtered by type Temperature
url: "{{baseUrl}}/sensors?type=Temperature"
method: GET
queryParams:
  - key: type
    value: Temperature
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });

      pm.test('All sensors are Temperature', function () { var arr =
      pm.response.json(); pm.expect(Array.isArray(arr)).to.be.true;
      arr.forEach(function(s){ pm.expect(s.type).to.eql('Temperature'); }); });
order: 9000
