$kind: http-request
name: Trigger 500 global error
url: '{{baseUrl}}/sensors/!!invalid!!'
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 500', function () { pm.response.to.have.status(500); });
      pm.test('Response has error field', function () { var json = pm.response.json(); pm.expect(json).to.have.property('error'); });
      pm.test('Response does not expose stack trace details', function () { var text = pm.response.text(); pm.expect(text).to.not.include('Exception'); pm.expect(text).to.not.include('stackTrace'); });
order: 20000
