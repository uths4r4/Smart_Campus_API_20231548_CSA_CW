$kind: http-request
name: Post reading to MAINTENANCE sensor — expect 403
url: '{{baseUrl}}/sensors/MAINT-001/readings'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "value": 99.9
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 403', function () { pm.response.to.have.status(403); });
      pm.test('Response has error field', function () { var json = pm.response.json(); pm.expect(json).to.have.property('error'); });
order: 11993
