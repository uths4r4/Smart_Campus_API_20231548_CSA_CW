$kind: http-request
name: Get all sensors - GET /sensors
url: "{{baseUrl}}/sensors"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      pm.test('Returns array', function () { var json = pm.response.json(); pm.expect(Array.isArray(json)).to.be.true; });
