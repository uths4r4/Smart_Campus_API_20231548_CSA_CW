$kind: http-request
name: Create sensor CO2-001
url: '{{baseUrl}}/sensors'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "CO2-001",
      "type": "CO2",
      "roomId": "LIB-301",
      "currentValue": 400.0
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 201', function () { pm.response.to.have.status(201); });
      pm.test('Response id equals CO2-001', function () { var json = pm.response.json(); pm.expect(json.id).to.eql('CO2-001'); });
order: 6000
