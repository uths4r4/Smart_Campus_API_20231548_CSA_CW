$kind: http-request
name: Get readings - GET /sensors/:sensorId/readings
url: "{{baseUrl}}/sensors/TEMP-001/readings"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      pm.test('Readings array returned', function () { var json = pm.response.json(); pm.expect(Array.isArray(json)).to.be.true; pm.expect(json.length).to.be.at.least(1); });
order: 5043
