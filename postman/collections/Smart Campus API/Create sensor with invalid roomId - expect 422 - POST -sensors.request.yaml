$kind: http-request
name: Create sensor with invalid roomId — expect 422
url: '{{baseUrl}}/sensors'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "CO2-999",
      "type": "CO2",
      "roomId": "FAKE-ROOM",
      "currentValue": 0.0
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 422', function () { pm.response.to.have.status(422); });
      pm.test('Response has message field', function () { var json = pm.response.json(); pm.expect(json).to.have.property('message'); });
order: 7000
