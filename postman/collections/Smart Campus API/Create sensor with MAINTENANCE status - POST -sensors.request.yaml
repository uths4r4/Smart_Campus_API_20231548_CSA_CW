$kind: http-request
name: Create sensor with MAINTENANCE status
url: '{{baseUrl}}/sensors'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "MAINT-001",
      "type": "Temperature",
      "roomId": "LIB-301",
      "status": "MAINTENANCE",
      "currentValue": 0.0
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 201', function () { pm.response.to.have.status(201); });
      pm.test('Response status equals MAINTENANCE', function () { var json = pm.response.json(); pm.expect(json.status).to.eql('MAINTENANCE'); });
order: 11986
