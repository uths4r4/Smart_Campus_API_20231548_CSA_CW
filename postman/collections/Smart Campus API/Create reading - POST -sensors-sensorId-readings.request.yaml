$kind: http-request
name: Create reading - POST /sensors/:sensorId/readings
url: "{{baseUrl}}/sensors/TEMP-001/readings"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "value": 24.3
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 201', function () { pm.response.to.have.status(201); });
      pm.test('Reading present and has value', function () { var json = pm.response.json(); pm.expect(json.value).to.eql(24.3); });
order: 4862
