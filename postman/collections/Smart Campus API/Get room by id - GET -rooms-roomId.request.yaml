$kind: http-request
name: Get room by id - GET /rooms/:roomId
url: "{{baseUrl}}/rooms/LIB-301"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () { pm.response.to.have.status(200); });
      pm.test('Response has id LIB-301', function () { var json = pm.response.json(); pm.expect(json.id).to.eql('LIB-301'); });
order: 1930
